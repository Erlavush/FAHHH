<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="standGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a3c2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6b5a45;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a3c2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shadeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e6d3;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffcc80;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffcc80;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Glow effect behind lamp -->
  <ellipse cx="50" cy="28" rx="28" ry="20" fill="url(#glowGradient)" opacity="0.6"/>
  
  <!-- Base -->
  <ellipse cx="50" cy="82" rx="18" ry="6" fill="#4a3c2e"/>
  <ellipse cx="50" cy="80" rx="15" ry="5" fill="#5c4d3c"/>
  
  <!-- Stand -->
  <path d="M46 78 L48 35 L52 35 L54 78 Z" fill="url(#standGradient)"/>
  
  <!-- Lampshade -->
  <path d="M30 38 L35 15 L65 15 L70 38 Z" fill="url(#shadeGradient)" stroke="#e8d5c0" stroke-width="0.5"/>
  
  <!-- Shade top rim -->
  <ellipse cx="50" cy="15" rx="15" ry="4" fill="#fff8e7" stroke="#e8d5c0" stroke-width="0.5"/>
  
  <!-- Inner glow -->
  <ellipse cx="50" cy="28" rx="12" ry="10" fill="#ffeecc" opacity="0.5"/>
  
  <!-- Light rays -->
  <path d="M20 28 L5 5 L15 8 L25 28 Z" fill="#ffcc80" opacity="0.3"/>
  <path d="M80 28 L95 5 L85 8 L75 28 Z" fill="#ffcc80" opacity="0.3"/>
  <path d="M50 10 L50 0" stroke="#ffcc80" stroke-width="2" opacity="0.4"/>
</svg>